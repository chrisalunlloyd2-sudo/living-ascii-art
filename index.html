<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Living ASCII Art - Tech Dashboard</title>
    <style>
        /* Rainbow Wave Animation - No Fade */
        @keyframes rainbowWave {
            0% { filter: hue-rotate(0deg) drop-shadow(0 0 5px #ff0000); }
            20% { filter: hue-rotate(72deg) drop-shadow(0 0 5px #ff7f00); }
            40% { filter: hue-rotate(144deg) drop-shadow(0 0 5px #ffff00); }
            60% { filter: hue-rotate(216deg) drop-shadow(0 0 5px #00ff00); }
            80% { filter: hue-rotate(288deg) drop-shadow(0 0 5px #0000ff); }
            100% { filter: hue-rotate(360deg) drop-shadow(0 0 5px #8b00ff); }
        }

        @keyframes waveMotion {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-2px) rotate(1deg); }
            50% { transform: translateY(-4px) rotate(0deg); }
            75% { transform: translateY(-2px) rotate(-1deg); }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            overflow-x: hidden;
            padding: 20px;
        }

        #ascii-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Navigation Menu */
        .ascii-menu {
            background: #0d0d0d;
            border: 1px solid #00ff00;
            border-radius: 6px;
            padding: 12px 0;
            text-align: center;
            margin: 15px 0 30px 0;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }

        .ascii-menu a {
            color: #00ffcc;
            text-decoration: none;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            margin: 0 14px;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .ascii-menu a:hover {
            color: #ff4d4d;
            background: rgba(255, 77, 77, 0.1);
            text-shadow: 0 0 8px #ff4d4d;
        }

        .section {
            margin-bottom: 30px;
            padding: 15px;
            border-left: 3px solid #00ff00;
            background: rgba(0, 0, 0, 0.3);
        }

        h2 {
            color: #00ff80;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00ff80;
        }

        h3 {
            color: #00ff80;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00ff80;
        }

        .ascii-art {
            color: #00ff00;
            font-size: 14px;
            line-height: 1.4;
            white-space: pre-wrap;
            animation: rainbowWave 8s linear infinite, waveMotion 3s ease-in-out infinite;
            text-shadow: 0 0 5px #00ff00, 0 0 10px #00ff80;
        }

        .tech-section pre,
        .repos-section pre,
        .steps-section pre {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            margin: 10px 0;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .menu-content {
            font-size: 13px;
            line-height: 1.6;
            color: #ccc;
        }

        .menu-content ul,
        .menu-content ol {
            margin: 10px 0 10px 25px;
        }

        .menu-content li {
            margin-bottom: 6px;
        }

        .note {
            color: #ffaa00;
            font-size: 12px;
            font-style: italic;
            margin-top: 10px;
            border-left: 2px solid #ffaa00;
            padding-left: 10px;
        }

        a {
            color: #00ffff;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .footer {
            text-align: center;
            color: #888;
            margin-top: 30px;
            font-size: 12px;
        }

        /* Walkthrough card styles */
        .walkthrough-card ol {
            color: #00ffcc;
        }

        /* Forum styles */
        .forum-category button.new-post-btn:hover {
            background: #00cc00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        .forum-post a:hover {
            color: #ff4d4d;
            text-shadow: 0 0 5px #ff4d4d;
        }

        /* Modal styles */
        #post-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #0d0d0d;
            border: 1px solid #00ff00;
            border-radius: 8px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }

        .modal-header h3 {
            color: #00ff80;
        }

        .modal-close {
            background: none;
            border: none;
            color: #ff4d4d;
            font-size: 24px;
            cursor: pointer;
            line-height: 1;
        }

        .modal-close:hover {
            text-shadow: 0 0 10px #ff4d4d;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            color: #00ffcc;
            margin-bottom: 5px;
            font-size: 13px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            padding: 10px;
            border-radius: 4px;
            font-size: 13px;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #00ff00;
            color: #000;
        }

        .btn-primary:hover {
            background: #00cc00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        .btn-secondary {
            background: #333;
            color: #00ffcc;
            border: 1px solid #00ffcc;
        }

        .btn-secondary:hover {
            background: #444;
        }

        /* Mobile responsive */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            .ascii-menu a {
                display: inline-block;
                margin: 6px 8px;
                font-size: 13px;
            }

            .ascii-art {
                font-size: 11px;
            }

            .modal-content {
                padding: 20px;
            }

            .walkthrough-card {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div id="ascii-container">
        <h1>🚀 Living ASCII Art - Tech Dashboard</h1>

        <!-- Navigation Menu -->
        <nav class="ascii-menu">
            <a href="#forums">Forums</a>
            <a href="#walkthroughs">Walkthroughs</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
        </nav>

        <!-- Live Feed (updates every 5 min) -->
        <div class="section" id="live-feed">
            <h2>Live Feed</h2>
            <pre class="ascii-art">Loading tech news and projects...</pre>
        </div>

        <!-- Walkthroughs Section -->
        <section id="walkthroughs" class="section">
            <h2>📘 Walkthroughs</h2>
            <div id="walkthroughs-content" class="menu-content">
                <p style="color:#888; text-align:center; padding:20px;">Loading walkthroughs...</p>
            </div>
        </section>

        <!-- Forums Section -->
        <section id="forums" class="section">
            <h2>💬 Forums</h2>
            <div id="forums-content" class="menu-content">
                <p style="color:#888; text-align:center; padding:20px;">Loading forums...</p>
            </div>
        </section>

        <!-- About Section -->
        <section id="about" class="section">
            <h2>ℹ️ About</h2>
            <div id="about-content" class="menu-content">
                <p style="color:#888; text-align:center; padding:20px;">Loading...</p>
            </div>
        </section>

        <!-- Contact Section -->
        <section id="contact" class="section">
            <h2>📧 Contact</h2>
            <div id="contact-content" class="menu-content">
                <p style="color:#888; text-align:center; padding:20px;">Loading...</p>
            </div>
        </section>
    </div>

    <!-- New Post Modal -->
    <div id="post-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>New Forum Post</h3>
                <button class="modal-close">&times;</button>
            </div>
            <form id="new-post-form">
                <input type="hidden" id="post-category" name="category">
                <div class="form-group">
                    <label for="post-title">Title</label>
                    <input type="text" id="post-title" name="title" required maxlength="100" placeholder="Enter post title...">
                </div>
                <div class="form-group">
                    <label for="post-author">Author (optional)</label>
                    <input type="text" id="post-author" name="author" maxlength="30" placeholder="Your name or handle">
                </div>
                <div class="form-group">
                    <label for="post-content">Content</label>
                    <textarea id="post-content" name="content" required maxlength="5000" placeholder="Write your post..."></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary modal-close">Cancel</button>
                    <button type="submit" class="btn btn-primary">Post</button>
                </div>
            </form>
        </div>
    </div>

    <script src="ascii_art.js"></script>
</body>
</html>
