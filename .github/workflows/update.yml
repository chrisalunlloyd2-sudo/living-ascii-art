name: Update Content
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Fetch news and repos
        run: python3 scripts/fetch_data.py
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add news.json repos.json
          git commit -m "Auto-update content" || echo "No changes"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/chrisalunlloyd2-sudo/living-ascii-art.git
          git push
